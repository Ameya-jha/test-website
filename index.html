<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Hidden Admin Trigger (Top Left Corner) -->
    <button id="admin-btn" class="btn-minimal">🔑 Admin</button>

    <!-- Main View: User IP Display -->
    <div id="main-view" class="container">
        <div class="card">
            <h1>Your Public IP Address</h1>
            <div id="ip" class="ip-display loading">Locating...</div>
            <p class="subtitle">This is the public address your network uses to talk to the internet.</p>
        </div>
    </div>

    <!-- Password Protection Overlay -->
    <div id="password-modal" class="modal hidden">
        <div class="modal-card">
            <h2>Admin Authentication</h2>
            <input type="password" id="password-input" placeholder="Enter security key..." autocomplete="off">
            <div id="login-error" class="error-msg hidden">Invalid Access Key</div>
            <div class="modal-actions">
                <button id="cancel-btn" class="btn btn-secondary">Cancel</button>
                <button id="submit-pass-btn" class="btn">Unlock</button>
            </div>
        </div>
    </div>

    <!-- Admin Dashboard View -->
    <div id="admin-view" class="container hidden">
        <div class="dashboard-card">
            <div class="dashboard-header">
                <div>
                    <h2>System Login Audit</h2>
                    <p class="dashboard-subtitle">Historical records of visitor network locations</p>
                </div>
                <button id="back-btn" class="btn btn-secondary">Exit Session</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Login Timestamp</th>
                            <th>Network IP Address</th>
                        </tr>
                    </thead>
                    <tbody id="logs-tbody">
                        <!-- Systematic logs render here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
