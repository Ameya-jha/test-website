<!-- Inside the #tos-modal ... find the .tos-scrollbox and paste this right below it -->
<div class="tos-scrollbox">
    <!-- Existing TOS content remains here -->
</div>

<!-- NEW: CAPTCHA Interface Container -->
<div class="captcha-container">
    <div class="captcha-visual">
        <canvas id="captcha-canvas" width="160" height="50"></canvas>
        <button id="refresh-captcha-btn" type="button" class="btn-refresh" title="Refresh CAPTCHA">🔄</button>
    </div>
    <input type="text" id="captcha-input" placeholder="Type the characters above" autocomplete="off">
    <div id="captcha-error" class="error-msg hidden">Incorrect CAPTCHA. Please try again.</div>
</div>

<div class="modal-actions">
    <button id="decline-btn" class="btn btn-danger">Decline & Exit</button>
    <!-- Note: We add 'disabled' here so they can't click it until verified -->
    <button id="accept-btn" class="btn" disabled>Accept & Start Playing</button>
</div>
